front:
  text: 序醫在幼科尤當精擇蓋嬰兒稟氣未堅難禁湯藥自非深察確見病源鮮能奏效也昔錢仲陽為小兒醫方之祖其論述備載準繩中第時異世殊方證不合於今至於陳氏諸書偏寒偏熱亦非南北共宜者後學之士烏能以折衷而奇中也哉余輯問對一書小兒與大人證治相同者一不更贅加觀氣色驗指紋胎寒胎熱臍風撮口變蒸臟腑經絡夜啼驚風疳癇丹毒囊腫遊風龜胸丁奚五軟解顱痘疹等患因數立方依方合劑名曰小兒諸證補遺書成公之衆方俾家藏一冊考究有素可無臨證之妄投語曰為人父者不可以不知醫此類是也崇禎九年歲次丙子菊月上浣五日大梁七十四歲老人張昶序
