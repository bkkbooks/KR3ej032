body:
  text: 一面部五色圖青色肝病至赤紅病心經黃色脾與胃白色肺不寧黑色入腎危俱現五色中二面部五色歌左腮屬肝右屬肺額屬心兮鼻屬脾腎主頦間驗諸證更參五色透天機肝病生時面青黧白色春來未為吉是謂肺金克肝木脅痛泄青不須疑心經火病面紅赤夏令黑起甚不宜水來剋火心難支狂惑天釣病蹺蹊小兒面白知肺虛秋時見紅火上移金被火克無停止咳嗽夜啼無寧時腎病發現面青黧冬來土黃上面皮水被土克多癃閉痿黃更無軟足膝唇紅面赤感傷寒臉黑唇青驚風疾唇青面白染瘧痢面黃如土停食積三面部病證圖頭者六陽經絡之會面者五臟氣血之榮臟者神之舍色者神之標五臟衰敗面容枯槁五臟壯盛顏色潤澤枯槁者亡潤澤者昌經以望知為神能察生死氣色也四面部病證歌額青主驚紅主熱印堂青驚紅驚熱印堂白淨無病證太陽紅色下淋血青驚亦是傷寒候太陰青紅俱驚厄青深惡候危篤困兩眉尖頭顯紅色每夜啼哭煩躁熱風池紅熱更多啼土黃吐逆危困也兩眼黑睛黃傷寒白睛黃積赤心熱淡紅心虛短精神兩睛青色肝經熱山根紫傷乳青驚若然青黑危困也準頭近里名年上偶發紅色或赤色小兒吐痢無休歇兩腮紫紅痰氣發青是慢驚將至也人中色黑蟲腹痛點點黑星吐痢厄臉赤傷寒顴紅熱正口淡紅無病證乾燥脾熱白虛怯承漿黃吐青主驚金匱青筋受驚色凡治小兒諸病證先看氣色後驗脈五小兒虎口三關脈歌食指側上頭節紋男左女右風關定青色雷響走獸驚赤色飛鳥人嘯聲黑色水喝痛撲跌紫色風寒感冒重食指二節氣關名察看五色認里證青色肝疳黑色腎赤心白肺黃脾應紫筋沖關成驚疳察驗卯關沉疴病紋到辰位傷命關疲痞疳疾危惡境諸筋屈曲食傷攻內隱青筋急慢驚紋頂命關顏色活急整藥餌速救命若見死暗開魚刺到此無由再得生色現寅位病勢輕紋過卯關病已成越外生枝實難醫紋過辰位天命終紋形一直透三關說與醫家藥休用更參按摩經脈形驗小兒諸證有準六小兒一指脈法或問曰小兒脈謂何用一指診之也對曰小兒一歲二歲為嬰孩只看虎口三關脈男七歲為髫年女八歲為齔年身體漸長乃可用小方脈診之若三四歲時號曰幼童身軀矮小肢體未能長成難下三指定寸關尺部位可用一指從關上滾轉看三部之脈若五至六至為平和脈更加一指無別疴八九至是為積熱三四至來受寒多脈之浮沉遲數大小長短皆與大人相同可以察看百病方脈分別諸證七小兒胎寒證或問曰小兒胎寒何證也對曰嬰孩初生百日內覺口冷腹痛身起寒粟時發戰栗曲足握拳日夜啼哭不止或口噤不開名曰胎寒或曰因何致此也對曰嬰兒在胎時母因腹痛而致産亦有孕婦喜吃肥甘生冷時果皆致胎寒或懷胎時外感風寒暑濕多用涼藥內傷胎氣則孩生後昏昏多睡間或嘔吐瀉白若不早治必成慢驚風症宜用蒼朮厚朴半夏當歸人參前胡陳皮川芎同煨姜煎服微泄行後用桔梗陳皮縮砂茴香炮薑炙草調補泄止氣勻手足舒伸冷用參苓白朮散以養胃氣乳母宜戒生冷飲食庶保無虞或曰小兒有手足稍冷唇面微青額有多汗不貪飲食夜間多啼可與胎寒同證否也對曰小兒腹痛腸鳴瀉泄清濁間有不泄者日夜輕重但不口冷寒戰名為臟寒此證亦在百日內有之皆因臨産在地稍久冷氣侵逼或熱時涼水洗兒或斷臍帶短又捆縛不緊為寒氣所傷用白芍澤瀉甘草薄桂人參蒼朮厚朴乾薑加鹽炒茴香吳萸姜煎服乳母同服亦從寒類而治萬無一失八小兒胎熱證或問曰小兒胎熱何證也對曰嬰兒産下三朝旬日之間目閉而赤眼胞浮腫常作呻吟或多啼哭時復驚煩遍體壯熱小便赤黃由懷胎腹中母受時氣邪毒或外感風熱誤服溫藥受孕好食五味辛辣過多熱蘊於內熏蒸胎氣生下才有此證名曰胎熱或曰日久成何病證對曰胎熱即驚風之肇端也延遲不治則鵝口重舌木舌赤紫丹瘤自此而生先以木通萹蓄赤茯苓瞿麥滑石梔仁車前黃芩薄荷煎與乳母服使入於乳兒飲後通心氣解煩熱然後用燈心黃連秦皮木賊紅棗煎洗兩目自開後用天竺黃硼砂牙硝硃砂蟬退殭蠶鬱金川芎茯神令乳母服牛蒡子防風薄荷荊芥黃耆當歸白芍川芎甘草使從乳過乳母忌酒肉濕面庶得證安不致返復或曰小兒熱證久則重舌木舌若弄舌舒舌可與此同證否也對曰弄舌之證出於大病後舌略出不長一動即收此是惡候以木香白朮人參茯苓藿香乾葛甘草治之不愈將傳危證舒舌者因著衣服不常外感風熱入於心脾脾之脈絡繫於舌時復舒捲出急收緩或渴或不渴謂之舒舌或曰治當何如對曰宜泄心脾之熱藿香梔仁防風石膏甘草黃芩煎服但不可以大寒之劑攻之熱退寒起傳變他證難醫九小兒臍風撮口證或問曰小兒初生臍風撮口何證也對曰嬰孩分娩七日之內肚腹脹硬臍畔四圍浮腫口撮牙關不開攢眉而叫哭名曰臍風證或曰因何致此也對曰落草之初剪臍帶甚短或臍口捆縛不緊致外風侵入臍內或用鐵剪剪斷臍帶為冷所侵或牽動臍帶水入生瘡客風乘虛而入傳之於心蘊蓄其邪復傳脾絡致舌強唇青手足微搐口噤不能進乳啼聲似啞喉中痰涎潮響是其候也其證多致不救者由收生婆鹵莽以致於此今後生下小兒將臍中存下瘀血用手輕輕逼去軃至小兒足跟相齊提起胎衣挽成疙疸勒緊了外用布隔著咬斷疙疸外邊臍帶收盤臍上包縛小兒三日用豬膽汁熱水洗畢小兒捆縛枕上和攝硬麵一窩中鑽一孔將臍穿過窩來厚紙襯住肚皮鐵著架起臍帶油捻燎焦收放窩中取干蘄艾大炷灸三二時灸透臍內干臍脫落始免臍風撮口之患或曰小兒一七之外旬日之間有臍突而殤者何氣使然對曰臍突肚緊面帶青色口撮不開此肝風盛而脾土受制無法調治若遇此證百無一生縱然用蠍梢殭蠶蟬退龍齒牛膽南星調治得安亦非長壽者一遇驚跌必成慢脾風竟殞厥軀況臍突之證又非臍風一類或曰因何感受而成此證也對曰小兒初生沐浴時扎臍不緊穢水浸內至旬日外臍復光浮如吹捻動微響間或驚悸作啼治用白芍藥澤瀉甘草薄桂薏苡每服二錢空心煎服誤汗誤下加人參木香臍腫敷外消散大黃牡蠣朴硝研一二錢水調敷患處亦有可愈者十定小兒變蒸日期或問曰小兒生變蒸謂何而變謂何而蒸也對曰變是上氣蒸是體熱小兒分娩後定然生變蒸如龍脫骨虎轉爪蠶成眠蟬脫殼之類此證初來兩手搐搦有似驚風鼻氣喘急有似胸喉遍身發熱有似感冒腸鳴溏泄有似傷食先驗小兒唇生白點口生牙黃俗名小兒馬牙變蒸之候切不可妄投丸散煎劑亂行針灸致變他證禍生不測當安常處順節戒飲食變蒸退去自然安全或曰變蒸病有定數來有定期乎對曰小兒滿月二日後即一變生長腎氣天一生水所以先長腎氣也六十四日二變一蒸生長膀胱氣膀胱乃州都之官為腎之腑二變即生也九十六日三變生長心氣心氣至三個月始長心屬火此一變多生熱虛弱兒熱甚宜當涼臟熱退後即能嘻笑一百二十八日四變二蒸生長小腸氣小腸為心經之腑一百六十日五變生長肝氣肝主筋筋壯即能收持可以獨坐肝旺克脾令兒泄青變出泄止勿作驚氣泄青治也一百九十二日六變三蒸生長膽氣膽至二百日才長此時宜用心保護不宜驚跌恐成驚癇二百二十四日七變生長肺氣肺主皮毛至此毛髮漸盛二百五十六日八變四蒸生長大腸氣能動作扒步二百八十八日生長脾氣肌肉強壯三百零二十日十變五蒸生長胃氣脾胃至三百日始長成小兒將周歲自乳食之外不可任與米麵肉食致傷脾胃染成積塊泄痢小兒周歲乳母嚼物餂喂口中帶上唾涎入胃稠黏難化聚生疳疾至三百八十四日又一大蒸一歲零一月膝骨成始能獨立四百四十八日又一大蒸一歲零三月骨氣盛齒生全五百一十二日又一大蒸一歲零五月筋力強壯能步履不倦五百七十六日變蒸方完是一歲零七月語言始利便大都變蒸之患是為小兒緊關以二證較之蒸則重於變也據其所發之時大約不越乎此數若小兒稟受壯實調養氣血充足脾胃健旺或過期而後發發亦不甚覺若調養失節脾胃衰弱必未期而先發發即沉重纏綿後學當以意忖量不可執一而論也十一小兒春令肝膽證或問曰肝膽屬何經絡用事何時為病何狀對曰足厥陰肝經為臟足少陽膽經為腑屬木木曰曲直作酸酸味走肝王於春季肝為將軍之官納心血上貫於目最宜清順一有所傷多成血證眼疾膽為謀略之官為人之威重最宜調養有傷則震駭怯弱等證作矣虛則補之熱則涼之或曰補泄溫涼宜用何藥對曰補肝虛當歸牛蒡細辛木香草決明蔓荊子補膽虛遠志棗仁胡黃連龍齒川芎膽南星涼肝熱柴胡龍膽防風赤芍干菊花枯苓木賊車前地膚子涼膽琥珀天竺黃虎睛溫膽竹茹或曰小兒肝證若何對曰肝開竅於目瞳神屬腎青膜屬肝白膜屬肺上瞼屬脾下瞼屬胃大小眥屬心或曰目暗雀盲宜用何藥對曰柴胡黃芩黃連白芍防風木賊款冬花干菊蔓荊草決明又宜穀精草百草霜等分末細豬肝煮熟切片蘸吃以汁呷之或曰肝經壯熱青蒙赤腫何藥治之對曰龍膽柴胡芩連芍藥木賊干菊蔓荊草決明地膚痛甚加當歸有淚加細辛熱倍地膚或曰肺經熱甚白膜赤障何藥治之對曰防風赤芍山藥玄參桑白天冬麥冬芩連桔梗杏仁菊花加減同上或曰心經熱盛大小眥赤障胬肉何藥治之對曰生地黃滑石石膏芩連連翹梔子菊花蔓荊防風或曰脾經積熱上瞼赤腫膿爛何藥治之對曰白朮白芍芩連枳實石膏生地干菊蔓荊赤茯苓加減同上或曰胃經積熱下瞼赤爛何藥治之對曰白朮赤芍芩連滑石石膏梔子朴硝菊花蔓荊連翹加減同上或曰洗滌病眼以何藥對曰防風荊芥黃芩黃柏杏仁蔓荊文蛤銅青煎湯絹蘸洗拭乾點藥或曰點暴發眼用何藥對曰黃連洗淨為末二錢雞清敲打成水綿紙蓋上銅錢一個壓下雞翎蘸汁點掃其餘曬收用時井花水化稀翎點或曰點諸眼明用何藥對曰用海連膏甚捷黃連二兩為末井水一大碗和末熬取一盞防風當歸各二錢菊花赤芍生地甘草青鹽各五分共為細末入連汁內入蜜半杯熬成膏傾入甌候冷入乳沒血竭兒茶海螵蛸各五分麝半分共研千餘極細攪勻收貯新水化點或曰小兒膽氣怯弱心神驚悸治宜何藥對曰柴胡芩連人參白朮南星棗仁菖蒲胡黃連遠志川芎或曰心神虛怯久驚不安治宜何藥對曰柴胡芩連生地棗仁菖蒲遠志金鉛末細麵糊杵丸緑豆大硃砂為衣食遠米飲下三十丸此小兒肝膽經之病證也十二小兒夏令心小腸證附心包絡或問曰心與小腸屬何經絡用事何時為病何狀對曰手少陰心經為臟手太陽小腸經為腑俱屬火火曰炎上作苦苦味走心王於夏令心為君主之官乃一身之主宰最宜省事清順有傷則怔忡健忘等證必作小腸為受盛之官最宜溫和有傷則結滯嘔逆關格等證必作虛則補之熱則涼之寒則溫之驚則鎮之或曰補泄溫涼宜用何藥對曰補心虛紫河車當歸山藥茯神紅花女貞子涼心熱黃連連翹麥冬知母貝母生地玄參玄明粉滑石竹葉澤蘭葉竹瀝荊瀝能食用竹不能食用荊涼腸熱赤茯苓石膏玄明粉滑石鎮心驚遠志石菖蒲麝香溫心氣寒痛吳茱萸玄胡索川楝肉溫小腸寒桂枝肉桂乾薑白蔻縮砂草果小茴玄胡索溫小腸冷痛蒼朮芍藥陳皮半夏縮砂乾薑白蔻蘿蔔子玄胡小腸食積白芍蒼朮青陳皮枳實殼草果山楂神麯蘇葉萊蔔子麥芽熱鬱小腸柴胡黃芩黃連連翹滑石青皮朴硝桔梗梔仁或曰心包絡為一經何也對曰上古聖人論心包絡為一經者為心外之膜絡去心甚近最宜保護又名手心主名手厥陰經不言命門至伯區諸醫聖始別右腎為命門作手厥陰經屬相火亦作一臟以三焦為腑配之與左腎同或曰心胞去心既近亦能生證否也對曰宜用柴胡薄荷牡丹紫蘇葉蘇子三稜莪朮皂莢以調心氣若心氣虛弱顛倒健忘人參黃耆當歸茯神山藥菖蒲遠志女貞子末細紫河車煮熟搗爛杵丸緑豆大辰砂為衣食遠茶下三十丸心胸結滯不開服涼心之品自然心志開明聰明能記玄參生地黃芩黃連桔梗菖蒲遠志知母貝母滑石煎中和辰砂末服心胸客熱熏蒸不安用清上藥除三焦煩熱黃連四兩酒浸煮焙乾末細粳米飯杵丸緑豆大青黛為衣食遠白湯吞三十丸心氣作痛原於胃腕受寒停痰作痛謂在心邊故為心氣其實人無真心疼一疼即死矣治痛蒼朮白芍陳皮吳萸乾薑肉桂香砂草果川楝肉玄胡索麥芽狂惑之證原於氣腦痰迷心竅激成心風先服瓜蒂散後服解風散調理瓜蒂散苦瓜蒂藜蘆等分末細井水灌吐不止蔥白湯呷之立止解風散玄參茯神芩連貝母枳實荊芥防風連翹滑石生地半夏水煎和青黛服此小兒夏令之病證也十三小兒土旺令脾胃證或問曰脾胃屬何經絡用事何時為病何狀對曰足太陰脾經為臟足陽明胃經屬腑俱屬土土曰稼穡作甘甘味走脾胃脾胃為倉廩之官人之司命備具坤德而妙乾化最宜溫和一有所傷則成積聚痞滿翻胃吐酸嘈雜祕結鼓脹等證矣虛則補之實則泄之寒則溫之熱者涼之或曰補泄溫涼宜用何藥對曰補脾虛白朮白芍陳皮黃耆肉蔻補胃虛升麻木香蒼朮草果大腹皮香白芷泄脾實枳實枳殼山楂神麯紫蘇子萊蔔子泄胃實大黃芒硝溫脾寒縮砂吳萸肉桂乾薑白蔻益智附子麥芽溫胃寒良薑草蔻丁香木香半夏涼脾熱生地赤苓芩連生甘草涼胃熱黃連滑石石膏生芍藥或曰小兒脾胃諸症只以此治之尤有別治乎對曰四制白朮丸扶持脾胃補益氣血快爽精神小兒不可少此丸切不可多用枳實最能破人真氣況小兒脾胃純萃須當謹忌者方用白朮八兩二兩人乳浸炒二兩牛乳浸炒二兩童便浸炒二兩同黃耆水浸炒犍豬肚包粳米煮熟用末和丸黍米大食遠清茶下三四十丸藥豬肚亦能健脾胃犍豬肚一個酒洗淨入黃耆熟地末各二錢裝肚內扎住以醋醬少抹磁罐煮熟吃粥人弱加人參五分如冒感風邪須煎百沸湯解之白水二大碗滾百沸炒鹽一撮一餂鹽一飲湯終必盡飲少傾探吐吐得出就有發散之義吐後胃翻覆以和中飲安之和中飲白朮芍藥陳皮縮砂半夏草果麥芽寒甚加薑汁和藥呷之如飲食停聚膨脹時痛宜消導之縮砂草果山楂神麯紫蘇子萊蔔子如大寒腹痛先用尉痛法鹽一斤分作兩處各炒熱布包更換尉痛處再用白朮蒼朮陳皮青皮枳實厚朴防風縮砂草果附子麥芽水煎薑汁呷之熱鬱腹痛抑痰飲防風貝母半夏膽星枳實茯苓白芥煎服蛔攪腹痛男嬰兒病一月即生蟲女病兩月始生蟲使君子藜蘆鶴蝨雄黃檳榔白礬各等分末細外用楝根濃煎一碗調末先用雞蛋煎餅清晨吃下引蟲來吃少頃服下前藥大蟲皆死而出小蟲皆化為水停血腹痛除血散桃仁桂枝朴硝大黃下之消痞膏殭蠶一錢為末白馬尿研成膏布攤貼痞上自消桃仁膏桃仁蒼朮白芍青陳皮甘草梢牛膝人參等分末細煉蜜和膏入玄明粉攪勻收貯食遠白湯化二匙翻胃一為吃食偶著氣惱痰裹其食留滯胃口塞實少頃方吐一為粗吃食物忙咽納下小腸礙下心包腫脹不容即時便吐一為胃火旺盛燒住死血脾緊裹干胃無所納化半日方吐若臌脹須抑肝扶脾蒼朮白芍青陳枳實枳殼厚朴茯苓大腹皮抑肝加柴胡龍膽氣陷加升麻藿香若水蠱須扶脾消水蒼朮白芍厚朴枳殼茯苓郁李仁甜葶藶紙炒半生熟共末米飲調下若腸癰先消腫排膿黃芩連生地射干梔子花粉忍冬蒲公英水煎和沒藥末服若咳逆先溫暖脾胃蒼朮白朮陳皮半夏乾薑官桂吳萸縮砂草果附子麥芽或曰感何而成瀉泄對曰諸泄皆因熱初病宜下柴胡黃芩連柏梔子連翹石膏朴硝大黃下之或曰肚腹脹滿食即吐逆何泄也對曰脾泄也白朮白芍陳皮白茯苓諸泄必用之品甘草乾薑肉桂縮砂草果吳萸附子麥芽文蛤炒作引或曰飲食不化下利黃色何泄也對曰此胃泄也白朮白芍陳皮山楂神麯枳實枳殼茯苓甘草青皮紫蘇葉蘿蔔子炒作引或曰大便色白腸鳴切痛者何泄也對曰大腸泄也白朮白芍青陳當歸枳殼厚朴縮砂玄胡索頭痛加川芎白芷石膏藁本渴加葛根天花澤蘭葉或曰溲便膿血小便時痛何泄也對曰此小腸泄也白朮芍藥青陳石膏黃連梔子木通槐角煩躁加黃連知母地骨皮嘔吐加丁香薑汁或曰裡急後重便澀莖中作痛何泄也對曰大瘕泄也白朮白芍陳皮升麻枳殼厚朴梔子木通車前滑石黃柏薄荷或曰小兒病赤白痢疾何也對曰白是濕熱傷氣紅是濕熱傷血初病可下卻無止法白用黃芩黃連芍藥茯苓滑石柴胡枳實硝黃紅用柴胡黃芩黃連芍藥桃仁石膏枳實硝黃一下痢稍久則腸臟虛滑不能禁止切不可用粟殼兜澀可用後火封丸芩連芍諸痢必用枳殼甘草水煎和木香汁服白痢下後加陳皮生地柴胡白芷血痢下後文蛤黃芩黃連加桃仁當歸蒲黃藕節地榆紅痢下後加白朮當歸桃仁赤白相雜加陳皮蒼朮當歸裡急後重加升麻薄荷厚朴檳榔大孔垢痛加山梔仁滑石石膏朴硝加減用之或曰噤口痢何所感受而成對曰濕熱之甚也白朮白芍黃芩黃連滑石石膏生地黃升麻風化硝外用田螺搗爛用少許敷臍中內服人參石連散甚捷痢止後復痢乃氣血虛極人參黃耆當歸芍藥白朮川芎枳殼檳榔阿膠煎同木香汁服止泄痢火封丸文蛤丸焙枯末細爛飯杵丸緑豆大米飲下二十丸封關散亦能止泄痢大肉蔻一個切破剜心納乳香附子各三分麵煨末細米飲調一匙效此小兒脾胃證也十四小兒秋令肺大腸證或問曰肺與大腸屬何經絡用事何時為病何狀對曰手太陰肺臟手陽明大腸腑屬金金曰從革作辛辛味走肺旺於秋令肺為華蓋最上至清宜當安靜一有所傷則吐痰咳嗽哮喘脹滿肺癰肺痿等證連起大腸為傳送之官最宜清順有傷則祕塞腸風積血等證作矣虛則補之寒則溫之枯則潤之盛則泄之散則斂之熱則涼之或曰補泄溫涼宜用何藥對曰補肺虛人參補益肺氣紫菀潤肺止嗽阿膠補氣不足溫肺寒白蔻紫菀鹿角膠木香乾薑白芷潤肺枯杏仁瓜蔞仁天花粉牛蒡白前側柏葉泄肺盛枳實貝母防風厚朴枳殼斂肺散桑白皮白芍文蛤訶子五味子烏梅涼肺熱桔梗天冬麥冬黃芩梔子石膏兜鈴玄明粉竹瀝青黛涼腸熱白芍黃連滑石地榆芒硝大黃牽牛芫花槐莢秦艽蒲黃檳榔或曰小兒肺腸止從此治乎另有別治乎對曰春天肺宜發表荊芥白芷川芎蘇葉早晨咳嗽多肺中有火加地骨皮知母貝母夏令宜清熱竹茹黃連黃芩梔子地骨前半日咳嗽重胃火旺盛黃芩黃連石膏貝母秋令宜解涼柴胡知母連翹石膏梔仁午後咳嗽陰虛火動四物加知母黃柏冬令宜祛寒肉桂麻黃半夏黃昏咳嗽陰火上浮加連翹文蛤白芍地骨皮上焦痰盛加知母貝母枳實防風枳殼夜間咳嗽陰氣虛弱加知母百部馬兜鈴地骨積熱喘嗽加柴胡黃芩黃連梔子石膏頭痛鼻塞陽明火盛加芎芷芩連梔仁石膏或曰上焦熱盛脹滿喘咳亦以此治乎對曰清肺為主半夏泡七次香油炒焦二兩杏仁泡去黃皮尖牙皂拌煮熟去皂貝母去心各一兩面丸緑豆大青黛為衣食遠茶下三十丸或曰熱毒瘀積腸中下血何也對曰治以摘紅散柴胡芩連秦艽地榆檳榔滑石蒲黃芒硝大黃一下便通後用槐莢丸熟地黃槐莢黃連等分末細大豬腸一截拌糯米煮爛杵丸緑豆大茶下三十丸此小兒秋令肺大腸病證也十五小兒冬令腎膀胱證附命門三焦證或問曰腎經膀胱屬何經絡用事何時為病何狀對曰足少陰腎臟足太陽膀胱腑屬水水曰潤下作咸鹹味走腎旺於冬令腎經為人之真元宜當滋補有傷則成虛損勞瘵骨蒸盜汗等證膀胱為人之水府平素宜要清順有傷則成赤澀祕結淋瀝轉胞等證虛則補之寒則溫之滑則澀之熱則涼之或曰冬時補泄溫涼宜用何藥對曰補腎虛紫河車生地黃天麥門冬人參黃耆牛膝菟絲子肉蓯蓉鎖陽人牛乳鹿茸龜板溫腎寒胡蘆巴枸杞子韭子虎脛骨溫胞寒痛草烏小茴香五加皮胡蘆巴木香舶上硫黃玄胡索吳萸大附子澀腎滑龍骨牡蠣益智子涼腎熱玄參苦參黃柏黃連青鹽秦艽地骨牡丹皮知母梔子秋石涼胞熱痛豬苓澤瀉茯苓木通瞿麥梔子滑石車前連翹淡竹葉或曰小兒腎經只以此治乎尚有別治乎對曰祛小兒客熱制腎家伏火補益真元用四制黃柏丸川黃柏半斤二兩人乳浸炒胡二兩牛乳二兩薑汁二兩蜜水末細鍊蜜丸緑豆大食遠茶下三十丸若保固真元填精補髓用三才丸人參五錢天冬麥冬各一兩生熟地黃各二兩蜜丸空心酒下四十丸補添腎衰須一妙丸熟地黃四兩麥冬二兩煮羊肉杵丸緑豆大空心椒鹽湯下四十丸用五行丸亦可知母屬金一兩四錢胡桃屬木去粗皮三兩二錢黃柏屬水二兩七錢破故紙屬火一兩八錢縮砂屬土同花椒炒五錢蜜丸服若清心明目用一老丸槐子米泔浸炒糊丸空心服五十丸精滑夢遺固精丸益智菟絲子韭子牡蠣等分末細麻雀卵清和糊丸緑豆大空心鹽酒下三十丸骨蒸勞瘵梅連飲銀柴胡黃柏黃連犀角地骨皮牡丹皮烏梅肉水和童便煎服小兒傳尸童勞豬苓澤瀉銀柴胡條芩胡黃連黃柏秦艽犀角水和白馬溲煎調雄黃末服或曰小兒膀胱證何證也對曰水道鬱熱不清便亦祕結豬苓澤瀉黃連黃柏茯苓木通瞿麥車前滑石梔子淡竹葉水煎和青鹽汁服便毒初起大黃白芷等分酒水煎中空心溫服先取汗後行三四次冷粥補之熱毒沉鬱膀胱而溲血宜解熱止血豬苓黃連黃柏梔子炒黑茯苓木通車前滑石蒲黃大小薊藕節水煎和青鹽汁服熱毒結內溲血不止俗曰莖衄內服劉寄奴散外用槐角百草霜等分研細入馬口或曰小兒諸淋可同大人否也對曰濕熱傷血陷下而血淋濕熱傷氣陷下而白淋濕熱鬱結於下追逼煎煉而成石淋或曰治當何如對曰血淋豬苓澤瀉升麻木通滑石梔子車前瞿麥茯苓蒲黃蘇葉藕節水煎和青鹽汁服白淋豬苓澤瀉升麻木通黃連黃柏滑石梔子車前薄荷茯苓煎和青鹽汁服石淋豬苓澤瀉升麻木通瞿麥黃連黃柏梔子滑石石韋或水煎或米糊丸燈心湯三十丸一方白果七枚搗爛井花水一盞入蜂蜜一兩和服之妙或曰膀胱病止此乎尚有別證乎對曰有疝證木腎囊腫遺溲陰縮或曰何因而致此也對曰寒冷鬱結於下而成疝痛寒冷郁下墜於囊中而成木腎膀胱停濕外囊浮腫膀胱冷滑而成遺溲陰氣虛極囊縮於內或曰宜何藥治之對曰治疝痛臺烏小茴香玄胡索吳茱萸肉桂厚朴香附大附子酒水煎七滾熱服取汗木腎內服疝痛藥外用硫黃附子乾薑吳茱萸等分末細大蒜搗爛捶藥成膏敷囊上荷葉包之囊腫內服疝痛藥外用紫蘇葉蟬退共末韭菜搗汁捶藥成膏敷囊上荷葉包之若蚯蚓呵囊連小兒雞嘴俱腫蟬退煎湯熏洗即消遺溲益智菟絲韭子桂枝為末雄雞肝搗爛千杵丸緑豆大早晚鹽湯酒任下三十丸陰縮硫黃為末大蒜搗爛捶成膏敷陰上下再用蛇床子火燒筒中熏之龜囊立出或曰男兒右腎又有三焦屬何臟腑經絡用事何時為病何狀對曰右腎即命門左為腎以藏真水右為命門以藏相火後世名為手厥陰之經泄精之臟診脈軟緩是為命門平順泄精太多命門有傷相火翕然而起精泄夢遺潮熱並吐咯紅痰至於三焦為手少陽之腑管束人之一身亦宜和平有時或虛或熱則身體不和矣虛則補之熱則涼之或曰補泄可與左腎同否也對曰命門火衰陽痿不舉補以大附子鎖陽紫梢花川續斷三焦補虛以人參黃耆熟附子川芎炙甘草命門火熱乃龍雷之火得水愈熾不宜直斥龜板鱉甲地龍衰之以屬滋陰則火降涼三焦熱柴胡黃芩連柏連翹石膏知母地骨皮或曰心胸結熱脾胃熏蒸痰火鬱滯昏厥不省者三焦有餘之火也宜用何藥對曰石膏煅三兩甘草三錢共末不拘大小人以一匙半蜜研成膏井花水化下小兒半匙化下或曰補三焦虛弱宜何如對曰補中湯白朮陳皮人參黃耆川芎當歸白芍甘草附子麥芽或曰三焦有結熱宜何如對曰梨汁竹瀝頭男乳汁各一盞瓷器盛飯甑上蒸過取出候食遠作一二服或曰三焦火熱之甚宜何如對曰解毒湯芩連柏梔內熱加柴胡鬱金外熱加牡丹地骨骨蒸潮熱加地骨牡丹地龍心熱加石膏生地肝熱柴胡龍膽蔓荊胃熱滑石石膏甘草芒硝肺熱天冬麥冬虛熱參耆歸芍實熱柴膏硝黃此小兒二腎膀胱三焦之病證也十六小兒夜哭證或問曰小兒夜哭何也對曰有驚熱心熱寒疝觸犯神煞皆能令兒夜哭或曰因何致此諸證也對曰驚熱證為衣衾太厚多抱極暖處久坐致生煩悶邪熱攻心心藏神神亂則驚心與小腸為表裡啼哭時遺溲是也退熱鎮心治之自安心熱證見燈愈哭面紅多淚去燈稍息火陽物也心熱遇火兩陽相搏才有燈而哭甚經曰火疾風生乃能雨即此義也涼心安神哭乃止寒疝證每到黃昏後更初時哭多睡少哭聲不止直到天明乃胎中受寒夜間陽微陰盛腰曲流汗眼中無淚面容白而夾青伏臥而哭乃盤腸內釣之證名為寒疝治宜去宿冷溫下焦而安觸犯神煞小兒面色紫黑氣滯如怒呼時覺有恐懼及睡中警惕兩手抱母大哭不休此觸犯禁忌神煞而得或為惡祟所侵小兒目有所見口不能言但驚哭無時指紋俱隱玉環集有云忽然兩手脈不見定知唐突惡神靈先解其表次驅邪鎮心而安或曰諸證治當何如對曰驚熱牛蒡防風薄荷荊芥甘草乾葛黃芩白附子天麻鬱金主之心熱豬苓澤瀉白茯苓白朮肉桂黃芩甘草或用琥珀抱龍丸主之或曰抱龍之名何所取義對曰抱者保也龍者肝也肝應東方青龍木木生火所謂生我者父母也肝為母心為子母安則子安心藏神肝藏魂神魂定靜驚從何生故名抱龍也丸用琥珀天竺黃檀香人參白茯苓各一兩半粉草三兩枳殼枳實各一兩硃砂水飛四兩山藥六兩膽南星一兩金箔三百片除檀不見火箔砂不入內余研細汲新水丸芡實大砂箔為衣陰乾蠟固薄荷湯化下治寒疝蒼朮厚朴川芎白芷人參桔梗枳殼半夏陳皮吳萸小茴香煎服觸犯神煞蘇合香丸或抱龍丸或貼倒吊驢兒亦可止夜哭十七小兒急慢驚風證附慢脾風天釣暑風或問曰小兒急驚慢驚何以分別也對曰小兒急驚古名陽癇由於愛護不周或抱當風或近熱地日中多吃辛辣夜間覆衾太厚鬱蒸邪熱積於心經傳於肝家再遇跌撲叫呼雷聲鼓吹雞鳴犬吠受一切驚令兒夜臥不寧夢寐或笑或哭齧齒咬乳鼻額有汗氣促痰喘忽然悶絶目直上視牙關緊急手足搐掣熱盛而成惟面紅脈數可辨或曰何以致此也對曰心肝二經乃陽中之陽心火也肝風也風火陽物也風主於動火見風煙焰起五行之造化二陽相鼓風火相搏肝中之魂心中之神因熱則擾亂妄動故發驚心之神明獨不受觸遇有驚則發熱熱極生風風動搐掣名曰急驚若小兒慢驚古名陰癇陰主靜而搐緩故言慢或曰與急驚可同否也對曰此證皆因外感風寒內作吐泄久則曰慢神昏口角流涎身微溫眼上視而手握拳而搐又兼兩足動掣各辨男左女右搐者為順反此為逆口氣冷暖或囟門陷此虛極也脈沉無力睡則揚睛謂兩目半開半合此真陽衰耗陰邪獨盛陰盛生寒寒為水化水生肝木木為風化木克脾土胃為脾腑胃中有風瘛瘲漸生或曰瘛瘲何狀對曰兩肩微聳兩手垂下時復動搖不已曰瘛瘲此慢驚風也或曰小兒慢脾風證由急驚而成由慢驚而成也對曰小兒慢脾風證自慢驚傳變而成也始因吐泄經久不治致胃弱脾虛虛極生風風入經絡則手足不時動搖昏沉不醒面帶痿黃風勢太甚脾虛之極急用天麻飲灌服或用固真湯不論有熱有痰皆風入脾經亦是危證若痰如拽鋸之聲面無潤澤之色唇縮氣粗項軟搐甚無能為也或曰相類者有天釣其狀與此同否也對曰天釣初得時煩悶呵缺眼忽下淚身熱脈浮洪實是風痰壅聚上貫心包致經絡閉而不通目睛翻視頸項強僵兩手掣轉而後大哭如怒腳曲腰直內熱痰鳴爪甲皆青狀如鬼祟名曰天釣治法與急驚藥服先解風熱次理痰氣其證可瘳或曰小兒暑風亦能發搐可與此同否也對曰暑風一證因夏月感冒風熱太甚致面垢唇紅脈沉細數忽發驚搐不省人事治用消暑清心飲琥珀抱龍丸切忌溫補熱氣得補而愈盛尤宜謹慎戴原禮曰治驚不若滋腎蓋心屬火火性燥得肝風則煙焰灼起致生驚悸滋腎則水升火降邪熱無侵雖有肝風不生驚駭其法當於申時進補腎地黃丸一服或用琥珀抱龍丸用申時者原水生於申佐之以藥則腎水得平自無驚證矣十八小兒疳證或問曰小兒因何而有疳疾也對曰疳之為病多因過餐硬食而傷脾成積而不治傳之餘臟而成五疳之疾或曰五疳形狀若何對曰咬牙舒舌舌上生瘡愛飲冷水唇紅面赤喜伏眠於地或頭面赤腫名曰心疳目生睚眵髮際左臉多青或白睛微黃泄利稀水或如苔色或眼腫頭搖胸熱羸瘦名曰肝疳愛吃泥土冷物引飲無度身面俱黃發稀作穗頭大項細腹脹腳弱釀瀉臭穢肌瘦目蒙日涼夜熱不思飲食名曰脾疳鼻下赤爛手足枯細口有腥氣咳嗽喘急寒熱交攻名曰肺疳兩耳內外生瘡腿如鶴膝頭顱不合牙齒臭爛傳作走馬牙疳名曰腎疳唇口俱青涎流虺出名曰虺疳滿頂餅瘡腦熱顛高名曰腦疳身熱肌瘦鼻瘡赤爛名曰鼻疳腦後有核軟而不痛名曰無辜疳或曰治當何如對曰心疳胡黃連宣黃連黃芩生地連翹滑石代赭石末細豬心血杵丸緑豆大硃砂為衣薄荷湯下二十丸肝疳柴胡黃芩龍膽黃連川芎茯苓地骨皮豬肝血熟糯米杵丸青黛為衣茶下三十丸脾疳白朮白芍陳皮川芎山楂神麯青皮芩連玄明粉肺疳桑白款冬天麥冬杏仁桔梗黃芩連翹石膏五味子貝母腎疳苦參澤瀉梔子茯苓生地黃牡丹皮地骨皮虺疳桃仁使君子蘆薈蕪荑檳榔蟾酥雄黃末細楝根煎湯服二匙腦疳防風荊芥升麻藁本白芍白芷芩連草龍末細薄荷湯服鼻疳芩連黃柏兒茶雄黃乳香沒藥密陀僧豬油研成膏搽或曰無辜疳久則有利害否也對曰初生腦後項邊有核如彈子按之轉動軟而不痛內中有蟲形如米粉宜速去之免蟲隨氣血流散淫蝕腑臟以致肌體癰瘡便利膿血發熱羸瘦頭露頂高漸至不救急用竹刀刺破刮去核內粉蟲內服胡黃連宣黃連黃芩蕪荑蝟皮末細粥丸黍米大青黛為衣米飲下三十丸或曰走馬牙疳因何所致也對曰此證多因氣虛受寒及有宿滯留而不去積濕成熱虛熱之氣上蒸或吃甘酸鹹膩之物脾雖喜甘積滯日久蘊熱上熏於口致齒焦黑爛時出清血血聚成膿膿臭生蟲侵蝕口齒甚致腮頰穿破乳食不便氣喘發熱名曰走馬牙疳或曰治當何如對曰先用溫鹽水灌嗽或軟雞翎蘸鹽水拂洗拭乾密陀僧輕粉麝香末細敷上經久不愈傳染唇之上下即成崩砂證令穴發滿腮齒落骨露乳食漸減氣促痰鳴危篤難救十九小兒丹毒證或問曰小兒因何而生丹毒也對曰積熱深久鬱於經絡皮膚之間而成此毒也或曰其名有幾其狀若何對曰頭上先起名赤杜丹兩脅先起名赤水丹面上先起名鬼火丹陰上先起名胡漏丹項周匝先起名飛煙丹兩腿先起名野火丹臍周圍先起名胡次丹滿身齊起名煙火丹脊背先起名天火丹兩腳先起名天煙丹或曰治當何如對曰諸丹內服芩連黃柏梔子薄荷滑石石膏生地牡丹地骨水煎和玄明粉服外治赤杜丹赤石脂滑石雞清研搽赤水丹鐵鏽末豬糞汁研搽鬼火丹伏龍肝雞清調搽胡漏丹屋漏泥煅末羊油研搽飛煙丹六一散煅末蔥白研汁搽野火丹乳香密陀僧研羊油搽胡次丹檳榔石膏醋搽煙火丹豬槽下土煅末香油搽天火丹桑白皮末羊油搽天煙丹寒水石煅末香油搽此治小兒丹毒之大略也二十小兒陰囊證或問曰小兒囊有腫者有痛者何氣使然對曰諸筋會於陰器邪客於厥陰少陰之經與冷氣相摶則陰囊腫痛而引縮經中分為四證腸㿗氣㿗水㿗卵㿗也小兒患此調治不早則成痼疾如腰曲腹痛冷汗自出陰囊二子吊縮入腹痛定方出名曰內吊又有陰根全縮不見有陰囊光腫不痛此因肝腎氣虛之極或曰治當何如對曰橘核仁金鈴子小茴香青皮檳榔陳皮木香治之或曰內經云㿗癃疝何症也對曰腹脹者陰氣盛而脈脹不通故為㿗癃疝大都陰氣獨盛遂致有此吊縮者筋急也筋遇寒則引縮遇熱則弛張宜寬小腸氣疏風邪為主多因久坐濕地感風濕而得或曰治當何如對曰赤芍當歸川芎麻黃大黃甘草檳榔煎服或曰外腎無故而膚囊腫大何也對曰其證木硬不痛光亮如吹此氣虛所致或曰治當何如對曰桔梗陳皮縮砂茴香乾山藥甘草治之或曰小兒外腎膚囊亦腫通明及女兒陰戶腫脹何氣使然對曰乃心熱之所傳皆以木通萹蓄瞿麥車前子滑石赤苓梔仁黃芩或用酒煎天花粉甘草不能飲酒水煎入酒服治小兒陰囊之大略也二十一小兒赤遊風證或問曰小兒有赤遊風何證也對曰遊風入兒五臟皆有外證可驗或曰形狀若何對曰赤遊風入心經令兒面赤唇紅夜多啼哭入肝經搖頭揉目多啼木舌入脾經面黃嘔吐虛汗酣睡入胃經嘔泄昏倦下黃赤物入肺經面色慘白氣粗喘急赤遊風欲作驚風令兒狂叫遊風積熱之甚令兒狂哭或曰治以何藥對曰風入心柴胡黃芩黃連生地連翹桔梗滑石青黛風入肝柴胡黃芩龍膽草黃連芍藥川芎茯苓地骨皮風入脾白朮黃芩黃連石膏滑石白芍扁豆風入肺桑白皮款冬花桔梗杏仁天麥門冬連翹梔仁遊風狂叫連翹柴胡滑石石膏茯神風化朴硝生地黃熱甚狂哭白朮陳皮芍藥木通生地梔子仁治赤遊風者以此二十二小兒龜胸證或問曰小兒何謂而生龜胸證也對曰小兒風痰停飲聚積心胸再感風熱肺為華蓋而最上居於膻中水氣泛濫則肺脹浮日久凝而為痰停滯心胸兼以風熱內發外證唇紅面赤咳嗽喘促致胸骨高如復掌名曰龜胸或曰治當何如對曰人參杏仁桑白皮柴胡旋覆花半夏桔梗枳殼赤芍治之若治愈而復作傳變別證目睛直視痰涎上壅兼以發搐亦為難治之證或曰小兒亦有龜背何也對曰初生嬰孩未滿半周強令坐早客風吹著脊背傳入於髓突出於背高如龜背之狀終成痼疾無法可治也二十三小兒丁奚證附哺露證或問曰小兒謂何而生丁奚之證也對曰亦積久成疳之漸也皆因飲食過多致傷脾胃脾胃虛弱不能運化飲食每食漸減不能生髮氣血面色慘白潮熱往來肚大青筋手足如筒顱囟開解頸項細削而身體黃瘦俗名丁奚病多服參苓白朮散以調脾為主斯證非一朝一夕可取效須緩緩圖之欲求速效豈可得乎或曰小兒又有哺露證與此同否對曰此證亦由飲食不節損傷脾胃脾胃虛弱飲食便減形容羸瘦臟腑之氣不能宣通遂成寒熱往來名為哺露此與丁奚相去不遠但此證多吐泄臟氣虛冷而瀉泄無度如穢汙中有蟲用殺蟲藥加於養臟藥中服亦不可求速效之證也二十四小兒五軟證或問曰小兒五軟何氣使然對曰此證由於父精不足母血素少受胎怯弱而成或曰止因父母精血衰弱而成尚有別證乎對曰有因母體血海久冷服藥強補而成孕者有受孕後母多疾者或因父好色貪酒氣體虛弱而成孕者或年紀已邁而後見子者有懷孕不足月而生者或誤服通經藥胎不墮而竟成孕者皆能耗傷真氣縱然得活有如陰地淺土草苗雖見發生而暢茂結實者少又如培植樹木搖動其根而成立者鮮矣大都小兒怯弱不耐寒暑設使成人多生疾病胎元虛弱降生之後氣血不足筋骨痿怯肌膚羸瘦精神短少一經六淫所浸便致頭項手足身軟是名五軟或曰治當何如對曰四物加參耆白朮茯苓山藥茯神或用六味地黃丸減澤瀉加鹿茸牛膝若投藥不效終為廢人矣或曰小兒肌膚強壯並不瘦削忽然項軟傾倒何也對曰俗名下竄由於肝腎氣虛客邪侵襲風府傳入筋骨遂成此疾蓋肝主筋腎主骨筋骨痿弱則項軟垂下無力又名天柱倒與五軟相類治亦相同或曰小兒解顱因何感受也對曰解顱者囟縫不合緣腎氣不足腎主骨而腦為髓海腎既不足則腦髓不滿故不合也名為解顱亦用前地黃丸月餘見效或有可治者若服藥不效亦成廢人或曰有囟腫者何也對曰有陰陽二證堅硬為陰紅軟為陽或曰治當何如對曰陰證桔梗陳皮縮砂茴香乾薑粉草人參白朮陽證防風川芎大黃白芷黃芩細辛甘草薄荷葉當歸赤芍或曰有囟陷者何也對曰虛之極也虛寒則囟陷慢驚胃寒脾困吐泄者虛之極急以人參附子白茯苓白朮山藥黃耆肉桂甘草治之或曰腦後枕陷何如對曰其證尤重於囟陷亦以囟陷藥治若不見效無法可療此大虛極百無一生之理二十五小兒痘證或問曰小兒痘證宜當何如對曰小兒痘候以脾為主脾土健旺自然剋制其水竟免黑陷之患便清自調痘出不快其病在表宜當汗之痘若黑陷身熱便祕其病在裡宜當下之當下而妄汗之則必血虛難靨當汗而誤下之則必氣陷難出所以痘候以解表和中為正法也或曰痘證多端宜何分治也對曰發脹之時眼目緊合肚腹膨脹痘瘡黑陷以土勝水難治之證用人大糞焙乾存性蜜湯調服三匙日進三服陷痘可起若不黑色而只頂陷氣弱也人參黃耆當歸白芍川芎升麻薄荷紫蘇紅花水煎和木香汁服熱悶驚搐者肝熱盛也柴胡龍膽草葛根芍藥黃芩黃連連翹梔子木賊石膏干菊煎和辰砂末服譫語狂躁心熱甚也防風柴胡黃芩連翹梔仁桔梗滑石石膏生地牛蒡煎和辰砂末服胸前稠密心實熱也黃連黃芩黃柏梔子加連翹桔梗滑石生地牛蒡紫蘇煎同硃砂末服氣極喘滿肺熱之甚也柴胡芩連連翹天麥門冬桔梗石膏桑白皮款冬花烏梅煎同青黛末服小便赤澀腎熱之甚也苦參茯苓瞿麥黃柏黃連黃芩木通澤瀉滑石石膏煎和青皮末服口渴引飲胃火太盛也芩連柴胡白芍連翹葛根天花粉天麥門冬滑石石膏澤蘭葉大便祕結腸熱之極也芩連柴胡厚朴枳實薄荷硝黃一下泄痢不禁腸胃濕熱也豬苓澤瀉青陳蒼朮芍藥川芎茯苓吐逆噁心胃中寒也白朮陳皮縮砂白豆蔻丁香乾薑煎和木香汁服常吃炒米湯為妙痘濕爛不收表虛血弱也白朮芍藥人參黃耆當歸熟地薄荷牛蒡萆薢地骨皮外用破故紙黃耆密陀僧共末搽上若五七日不收內熱之甚芩連柏梔加滑石石膏身灼如火不可太用寒涼豬苓澤瀉蒼朮芍藥甘草竹茹車前茯苓煎和硃砂末服痘跳入眼肝經積熱柴胡龍膽草黃芩黃連木賊蔓荊子甘菊花梔子仁桔梗連翹涼肺安心用常服散絲瓜蒂燒灰存性為末調服或煎湯服痘後風瘡內服忍冬藤牡丹皮地骨皮薄荷黃柏梔子黃連黃芩柴胡外敷乳香沒藥輕粉兒茶雄黃陀僧痘癰內服治風藥外貼紫金膏妙二十六小兒麻疹證或問曰小兒麻疹宜當何如對曰小兒麻疹以肺為主肺氣若勝自能平木不生血熱喘急腸垢之患便清自調潮熱拘緊病在於表宜當汗之身體煩躁大腸垢小便祕病在於里宜當下之麻疹一出遍於皮膚現而復隱是為在表受毒尚淺苟妄汗之反激熱而沉重發於皮膚狀如錦紋或赤斑結黑遍體不收是為裡急受毒極深苟誤下之反氣弱而難收如氣喘焮熱腸垢大泄是為木反勝金難治之證麻證初然發表升麻葛根湯升麻葛根芍藥甘草若見紅了再不可用葛根恐致表虛使其難靨不收熱毒把住熱甚亦令不出柴胡黃芩荊芥防風甘草牛蒡清弱血虛亦令不出白朮白芍人參當歸黃耆甘草紅花煎和木香汁服外用胡荽擂酒熱搽遍身發汗其疹出快表虛疹出爐灰色白朮蒼朮芍藥當歸升麻紅花煎和木香汁服血虛疹出淡金色白朮陳皮芍藥川芎人參黃耆升麻當歸胡荽紅花煎和木香汁服血熱之極疹出太盛防風柴胡黃芩黃連連翹芍藥犀角牡丹皮地骨皮但凡痘疹出不快而癢塌者血氣俱虛以白朮白芍人參黃耆當歸熟地薄荷白茯苓為主如有別證另行加減用之此其大略也二十七小兒引經諸藥歌藁本引經至頂巔羌活川芎頭中間蔓荊引經至兩目柴胡兩耳兩脅間竹瀝引經心肺里桔梗戴藥膈上邊白芥引經上焦界黃連引藥中焦安麥芽引藥走脾胃青鹽引經到腎源檳榔直入大腸內童便引藥到丹田梔子降火小便出牛膝虎脛至湧泉黃柏引經達足下丹骨梔皮皮膚串荊芥蘇葉入腠理狗脊直行兩臂間桂枝引經至兩手薄荷獨活周身纏二十八小兒外治諸效方張昶曰膏粱巨室産育嬰孩多由嬌養信慣百凡順從釀成性體熱拗病時定然不肯服藥縱逼迫強灌恐嚇成驚疾是所利不及其所害本堂擇家藏外治小兒效方三十有餘刊附補遺卷末遇小兒染恙按方治療免致他虞亦活幼之一助也治小兒水泄不止車前子連根科七月七日採來洗淨切碎陰乾每用一兩幼小用六七錢裝一布袋中汲水三四碗熬四五滾去袋試水大溫濯洗兩足勿令過踝子骨上洗至水冷待一二時泄止屢驗誤洗過膝上令小兒大便不行戒之治小兒下部受濕兩腿作痛叫哭不止取鮮艾葉二兩蔥頭一握搗碎生薑二兩同搗綿布裹成一包蘸極熱燒酒搽患處痛止為度治小兒鼻中衄血日久不止純黑驢糞焙乾為末頭髮燒灰存性等分每用少許吹入鼻中立止如復見血再吹一次即止除根治小兒痢疾回生膏川烏草烏大茴小茴木鱉仁川山甲各二兩大附子一兩切片香油半斤浸三日熬枯去渣入蔥姜炒過黃丹四兩熬滴水成朱攤貼臍上臍先姜搽紅白諸痢半日立止治小兒小便不通取萵苣子搗碎熱水調入臍中填滿臍約半炷香時分即通治小兒陰囊忽腫蟬退五錢水一茶鍾煎湯洗腫處立消至腫者不過洗二次永不發治小兒脫肛取池塘西北角浮萍放竹篩中值水上陰乾為末搽肛上即收不過二次除根治小兒胎驚天南星大者一個童便浸透火燒令裂為末寒水石火煅為末等分生薑汁為丸黃豆大薑湯化哺一丸乳汁送下胎驚立除治胎娃初覺臍風撮口白姜蠶直者炒去絲嘴為末每服一二分生薑汁調抹口內乳汁帶下可解以上二方因月里小兒尚少知識易於灌哺用此小兒臍濕不幹頭髮燒灰為末敷之即干小兒紅白口瘡不肯吃搽藥餌吳茱萸生南星各一兩為末醋丸彈弓子大臨用醋化濃膏晚上小兒睡著男左女右貼湧泉穴貼上包裹次日去藥愈男女小兒七八歲或十數歲紅爛眼梢蕤仁取霜官粉煅黃等分為末乳汁調稀稠得所臨睡搽眼角上次早洗去至重者不過搽二次如失小兒月發赤爛眼弦杏仁一個泡去皮尖研成泥銅緑豆大一塊為末乳汁調勻重湯煮熟搽患處三二次忌吃發物幾日永不再發小兒初生月里兩眼紅腫啼哭不止晚上用生白礬三錢為末放硬布上醋調稀稠得所男左女右貼腳心湧泉穴包裹次早眼消去礬小兒緊急危症傷寒不醒人事者用川烏草烏斑蝥巴豆細辛胡椒白礬乾薑麻黃各等分共為細末密收每用一錢半醋麵糊丸一彈子趁濕安在兒手心中拿合扎緊夾在腿襠中以被蓋暖露面出汗為度醒時去藥急用黃泥水洗手無後患小兒乳蛾喉痹咽痛等症蒲黃二錢青黛一錢飛白礬五分雞內金五分末之竹筒吹喉中二次即消小兒一切牙疳熬荊芥水漱淨上雄黃銅緑五倍子炒各五錢麝香一字研為細末搽患處上畢漿水漱口上至疳好為度小兒丹毒赤粒遍身研雄黃黃連緑豆粉各三錢香油調搽患處粒消為驗小兒疥癬坐板瘡海螵蛸去蓋淨稱五錢為末枯白礬一錢雄黃一錢二分硫黃一錢另研蛇床子二錢為末臼油三錢入鐵杓中化開入前末攪勻候將冷為丸彈弓子大熱水洗去甲火烤搽三次瘥小兒割耳瘡輕粉乳香沒藥枯礬官粉煅紅棗燒糊等分為末瘡濕干搽瘡干油調搽兩三次即瘥如瘡頑久不愈加珍珠煅等分同研用小兒盜汗不止五倍子為末唾津調填臍中紙蓋手帕縛定次日即止如不止再調填一次除根小兒耳底腫痛膿水不幹五倍子炒黃白礬枯龍骨煅各一錢麝香一分半不見火片腦一分另研通研細密收吹耳內當時止痛次日膿水立干小兒火燒湯燙著香油五錢涼水一小酒鍾梔子末細一錢瓷碗中銀簪打成稀膏雞翎掃患處幾次當時止痛不退皮起泡燒湯過兩三日成瘡五倍子炒末細重羅搽瘡上片時定甲止疼甲落痊小兒熱溲或熱汗浸爛腿斑成瘡腫癢痛楚官粉一錢煅蛤粉一錢半寒水石三錢炒白石脂滑石各一錢二分龍骨粟米粉各五分研細密收勿令泄氣用時干散患處一二次爛處有皮為度小兒壞痘外剝臭爛夏月生蛆折柳枝帶葉鋪地下將小兒臥上勿襯衣被蛆蟲盡出敗草散塗上愈小兒生䵶口瘡川黃柏刮去粗皮蜜炙胡黃為細末搽瘡上一二次當時止疼三日落甲小兒頭面耳輪生瘡膿水染流好皮即便成瘡俗名黃水瘡乳母懷抱皮黏膿水亦成瘡嫩黃耆為末豆粉減半研細香油調搽定甲即痊小兒頭腦上生瘡俗名膿黏瘡厚甲腥穢不痊海螵蛸白膠香各一錢輕粉五分研極細末密收先用清油潤去瘡甲後摻藥末只塗一次定甲如不痊可再塗一次平復除根小兒破傷手指入水被妬腫潰痛楚不愈生黃丹蛤蜊粉等分砂鍋炒至變了色取些須滲患處瘡口上須臾妬水逐出去水即瘥小兒蚰蜒誤入耳中混腦搖頭憔哭不止知中其毒取羊奶汁灌兩耳中蚰蜒並下入腦中子種盡皆化為水永除病根治小兒傷寒塗囟法麝香研一字牛黃末一字青黛末一字半蜈蚣末半字蠍尾去毒炒末半字薄荷半字同研勻熟棗肉和成膏新綿上塗勻貼囟上四方可出一指許火上炙手熱頻尉小兒初生百日裡外可用此法塗尉極效高都後學梁師孟曰叟甫繕書
